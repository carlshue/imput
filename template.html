<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control remoto</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        font-family: Arial;
        background: #0f172a;
        color: white;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        gap: 20px;
    }

    .buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 250px;
    }

    input {
        padding: 10px;
        border-radius: 8px;
        border: none;
        font-size: 1rem;
    }

    button {
        padding: 15px;
        font-size: 1.2rem;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    .ping { background: #22c55e; }
    .pang { background: #ef4444; color: white; }

    /* 🧹 BOTÓN BORRAR */
    .clear {
        background: #334155;
        font-size: 1rem;
        padding: 10px;
        width: 60px;
        align-self: center;
    }

    button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .table-container {
        width: 100%;
        max-width: 1000px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        color: black;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 8px;
    }

    th {
        background: #1e293b;
        color: white;
    }

    /* stats */
    .stats-grid {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 4px;
    }
    .stat-card {
        background: #1e293b;
        border-radius: 10px;
        padding: 14px 20px;
        flex: 1;
        min-width: 120px;
    }
    .stat-card .label { font-size: .7rem; color: #64748b; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .stat-card .value { font-size: 1.4rem; font-weight: bold; font-variant-numeric: tabular-nums; }
    .stat-card .sub   { font-size: .75rem; color: #475569; margin-top: 2px; }

    /* fichajes */
    .f-title {
        font-size: .7rem;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: .08em;
        margin-bottom: 10px;
    }
    .f-summary { width:100%; border-collapse:collapse; margin-bottom:20px; font-size:.85rem; }
    .f-summary th { background:#1e293b; padding:7px 12px; color:#64748b; font-weight:normal; font-size:.75rem; }
    .f-summary th:not(:first-child), .f-summary td:not(:first-child) { text-align:right; font-variant-numeric:tabular-nums; }
    .f-summary td { padding:7px 12px; border-bottom:1px solid #1e293b; }
    .f-summary .f-total td { border-top:2px solid #334155; background:#1e293b; font-weight:bold; }
    .f-scroll { overflow-x:auto; }
    .f-days { border-collapse:collapse; font-size:.7rem; white-space:nowrap; }
    .f-days th { background:#1e293b; padding:5px; color:#64748b; font-weight:normal; text-align:center; }
    .f-days td { padding:4px 5px; text-align:center; border:1px solid #1a2540; min-width:34px; }
    .f-days .f-mes { text-align:left; font-weight:bold; position:sticky; left:0; background:#0f172a; z-index:1; padding-right:8px; min-width:50px; }
    .f-days .f-sep { border-left:2px solid #334155; }
    .f-wk  { background:#1a2540; }
    .f-emp { color:#2d3f5a; }
    .f-ok  { color:#86efac; }
    .f-low { color:#fde68a; }
    .f-min { color:#fca5a5; }
    .f-tot { font-weight:bold; background:#1a2540; }
    .f-pos { color:#22c55e; }
    .f-neg { color:#ef4444; }
    .f-dim { color:#475569; }

    /* historial */
    .h-empty { color:#475569; font-size:.85rem; padding:12px 0; }
    .h-item {
        display:flex; align-items:center; gap:12px;
        padding:10px 0; border-bottom:1px solid #1e293b;
        font-size:.85rem;
    }
    .h-item:last-child { border-bottom:none; }
    .h-badge {
        background:#7c3aed22; color:#a78bfa;
        border:1px solid #7c3aed55;
        border-radius:6px; padding:2px 8px;
        font-size:.7rem; white-space:nowrap; flex-shrink:0;
    }
    .h-desc { flex:1; color:#cbd5e1; }
    .h-desc b { color:#e2e8f0; }
    .h-before { color:#ef4444; font-variant-numeric:tabular-nums; }
    .h-after  { color:#22c55e; font-variant-numeric:tabular-nums; }
    .h-arrow  { color:#475569; margin:0 4px; }
</style>
</head>

<body>

<div class="container">

    <h1>Ping Pong Dashboard</h1>

    <input id="keyInput" type="password" placeholder="Introduce key..." />

    <div class="buttons">
        <button class="ping" onclick="ping()">Entrada</button>
        <button class="pang" onclick="pang()">Salida</button>

        <!-- 🧹 BOTÓN BORRAR -->
        <button class="clear" onclick="clearHtml()">🗑️</button>
    </div>

    <div class="table-container">
        {{tabla}}
    </div>

    <div class="table-container" style="margin-top:32px;">
        <div id="stats-section"><p style="color:#475569;font-size:.85rem;">Cargando balance...</p></div>
    </div>

    <div class="table-container" style="margin-top:24px;">
        <div id="fichajes-section"><p style="color:#475569;font-size:.85rem;">Cargando fichajes...</p></div>
    </div>

    <div class="table-container" style="margin-top:24px;">
        <div id="historial-section"><p style="color:#475569;font-size:.85rem;">Cargando historial...</p></div>
    </div>

</div>

<script>

function setLoading(state) {
    document.querySelectorAll("button").forEach(btn => {
        btn.disabled = state;
    });
}

function getKey() {
    return document.getElementById("keyInput").value;
}

async function ping() {
    const key = getKey();

    if (!key) {
        alert("Necesitas introducir la key");
        return;
    }

    setLoading(true);
    await fetch('/ping?key=' + encodeURIComponent(key));
    window.location.reload();
}

async function pang() {
    const key = getKey();

    if (!key) {
        alert("Necesitas introducir la key");
        return;
    }

    setLoading(true);
    await fetch('/pang?key=' + encodeURIComponent(key));
    window.location.reload();
}

async function clearHtml() {
    setLoading(true);
    await fetch('/clear');
    window.location.reload();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
(async function loadStats() {
    const s = await fetch('/stats').then(r => r.json()).catch(() => null);
    const el = document.getElementById('stats-section');
    if (!s || s.error || s.detail || !s.dias_laborables) { el.innerHTML = '<p style="color:#ef4444;font-size:.8rem;">Error: ' + (s?.error || s?.detail || 'servidor no actualizado') + '</p>'; return; }

    const dc = s.diff_min > 0 ? '#22c55e' : s.diff_min < 0 ? '#ef4444' : '#e2e8f0';
    el.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Días laborables</div>
                <div class="value">${s.dias_laborables}</div>
                <div class="sub">${s.inicio} &rarr; ${s.hasta}</div>
            </div>
            <div class="stat-card">
                <div class="label">Horas esperadas</div>
                <div class="value">${s.horas_esperadas}</div>
                <div class="sub">con festivos y puentes</div>
            </div>
            <div class="stat-card">
                <div class="label">Horas fichadas</div>
                <div class="value">${s.horas_trabajadas}</div>
                <div class="sub">&nbsp;</div>
            </div>
            <div class="stat-card">
                <div class="label">Balance</div>
                <div class="value" style="color:${dc}">${s.diff}</div>
                <div class="sub">&nbsp;</div>
            </div>
        </div>`;
})();

// ── Fichajes ──────────────────────────────────────────────────────────────────
(async function loadFichajes() {
    const toMin = s => { if (!s || s === '--:--') return 0; const [h,m] = s.split(':').map(Number); return h*60+m; };
    const fmt   = m => Math.floor(m/60) + ':' + String(m%60).padStart(2,'0');
    const toHHMM= m => { const n=m<0; m=Math.abs(m); return (n?'-':'+')+fmt(m); };
    const dCls  = d => { if(!d.real||d.v==='--:--') return 'f-emp'; const min=toMin(d.v); return min>=480?'f-ok':min>=420?'f-low':'f-min'; };

    const rows = await fetch('/fichajes').then(r => r.json()).catch(() => null);
    if (!rows || !Array.isArray(rows)) { document.getElementById('fichajes-section').innerHTML = '<p style="color:#ef4444;font-size:.8rem;">Error cargando fichajes</p>'; return; }

    let tT=0, tP=0;
    rows.forEach(r => { tT += r.trabajado_min; tP += r.previsto_min; });
    const tD = tT - tP;

    let h = '<p class="f-title">Resumen mensual</p>';
    h += '<table class="f-summary"><thead><tr><th>Mes</th><th>Trabajado</th><th>Previsto</th><th>Diferencia</th></tr></thead><tbody>';
    rows.forEach(r => {
        const nd = r.trabajado === '--:--';
        const dc = r.diff_min > 0 ? 'f-pos' : r.diff_min < 0 ? 'f-neg' : '';
        h += `<tr><td>${r.mes}</td><td class="${nd?'f-dim':''}">${nd?'—':r.trabajado}</td><td>${r.previsto}</td><td class="${nd?'f-dim':dc}">${nd?'—':r.diff}</td></tr>`;
    });
    const tdc = tD>0?'f-pos':tD<0?'f-neg':'';
    h += `<tr class="f-total"><td>TOTAL</td><td>${fmt(tT)}</td><td>${fmt(tP)}</td><td class="${tdc}">${toHHMM(tD)}</td></tr>`;
    h += '</tbody></table>';

    h += '<p class="f-title" style="margin-top:16px;">Vista completa</p><div class="f-scroll"><table class="f-days"><thead><tr><th class="f-mes">Mes</th>';
    for (let i=1;i<=31;i++) h += `<th>${i}</th>`;
    h += '<th class="f-sep">Trab.</th><th>Prev.</th></tr></thead><tbody>';
    rows.forEach(r => {
        h += `<tr><td class="f-mes">${r.mes}</td>`;
        r.dias.forEach(d => {
            h += d === null ? '<td class="f-wk"></td>' : `<td class="${dCls(d)}">${d.real?d.v:''}</td>`;
        });
        const nd = r.trabajado === '--:--';
        const dc = r.diff_min>0?'f-pos':r.diff_min<0?'f-neg':'';
        h += `<td class="f-tot f-sep ${nd?'f-dim':dc}">${nd?'—':r.trabajado}</td><td class="f-tot f-dim">${r.previsto}</td></tr>`;
    });
    h += '</tbody></table></div>';

    document.getElementById('fichajes-section').innerHTML = h;
})();

// ── Historial ─────────────────────────────────────────────────────────────────
(async function loadHistorial() {
    const el = document.getElementById('historial-section');
    const data = await fetch('/historial').then(r => r.json()).catch(() => null);

    if (!data || data.error) {
        el.innerHTML = '<p class="h-empty">Error cargando historial</p>';
        return;
    }

    function fmtTs(ts) {
        // "20260223_000000" -> "23/02/2026 00:00"
        const d = ts.replace('_', '');
        return `${d.slice(6,8)}/${d.slice(4,6)}/${d.slice(0,4)} ${ts.slice(9,11)}:${ts.slice(11,13)}`;
    }

    let h = '<p class="f-title">Historial de cambios</p>';

    if (data.length === 0) {
        h += '<p class="h-empty">Sin cambios detectados entre snapshots.</p>';
    } else {
        data.forEach(c => {
            h += `<div class="h-item">
                <span class="h-badge">${c.mes} día ${c.dia}</span>
                <span class="h-desc">
                    Entre <b>${fmtTs(c.desde)}</b> y <b>${fmtTs(c.hasta)}</b>:
                    <span class="h-before">${c.antes}</span>
                    <span class="h-arrow">→</span>
                    <span class="h-after">${c.despues}</span>
                </span>
            </div>`;
        });
    }

    el.innerHTML = h;
})();

</script>

</body>
</html>
